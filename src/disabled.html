<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link non disponibile - Giovanni Romano</title>
    
    <link rel="icon" type="image/png" href="../media/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark-theme');
        } else {
            document.documentElement.classList.remove('dark-theme');
        }
    </script>
    
    <style>
        .disabled-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: var(--bg-color);
            background-image: var(--bg-gradient);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
        }

        .disabled-icon {
            font-size: 5.5rem;
            color: #ef4444; /* Soft Red Alert */
            margin-bottom: 2rem;
            animation: shake 0.6s ease-in-out infinite alternate;
            filter: drop-shadow(0 10px 20px rgba(239, 68, 68, 0.2));
        }

        .disabled-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.75rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        .disabled-text {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            color: var(--text-muted);
            max-width: 600px;
            font-weight: 300;
        }

        .back-button {
            padding: 0.9rem 2.25rem;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 8px 20px var(--shadow-color);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px var(--glow-color);
        }

        @keyframes shake {
            0% { transform: rotate(-6deg); }
            100% { transform: rotate(6deg); }
        }
    </style>
</head>
<body>
    <div class="disabled-container">
        <i class="fas fa-lock disabled-icon" aria-hidden="true"></i>
        <h1 class="disabled-title">Link non disponibile</h1>
        <p class="disabled-text">
            Questo codice sorgente o demo non è ancora accessibile pubblicamente.
            Se hai dubbi o vuoi saperne di più sul progetto, contattami direttamente.
        </p>
        <a href="../index.html" class="back-button">
            <i class="fas fa-home" aria-hidden="true"></i> Torna alla Home
        </a>
    </div>

    <script src="js/theme.js"></script>
</body>
</html>
