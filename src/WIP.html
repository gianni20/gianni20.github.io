<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pagina in fase di completamento nel portfolio di Giovanni Romano.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gianni20.github.io/src/WIP.html">
    <meta property="og:title" content="In Costruzione - Giovanni Romano">
    <meta property="og:description" content="Pagina in fase di completamento nel portfolio di Giovanni Romano.">
    <meta property="og:image" content="https://gianni20.github.io/media/io/io1.webp">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://gianni20.github.io/src/WIP.html">
    <meta property="twitter:title" content="In Costruzione - Giovanni Romano">
    <meta property="twitter:description" content="Pagina in fase di completamento nel portfolio di Giovanni Romano.">
    <meta property="twitter:image" content="https://gianni20.github.io/media/io/io1.webp">

    <title>In Costruzione - Giovanni Romano</title>
    
    <link rel="icon" type="image/png" href="../media/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark-theme');
        } else {
            document.documentElement.classList.remove('dark-theme');
        }
    </script>
    
    <style>
        .wip-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: var(--bg-color);
            background-image: var(--bg-gradient);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
        }

        .wip-icon {
            font-size: 5.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            animation: rotate 4s infinite linear;
        }

        .wip-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.75rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        .wip-text {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            color: var(--text-muted);
            max-width: 600px;
            font-weight: 300;
        }

        .home-button {
            padding: 0.9rem 2.25rem;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 8px 20px var(--shadow-color);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }

        .home-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px var(--glow-color);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-bar {
            width: 240px;
            height: 6px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            margin: 2rem 0;
            overflow: hidden;
            position: relative;
        }

        .loading-progress {
            width: 50%;
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 10px;
            animation: loading 2.2s infinite ease-in-out;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>
</head>
<body>
    <div class="wip-container">
        <i class="fas fa-cog wip-icon" aria-hidden="true"></i>
        <h1 class="wip-title">Pagina in Costruzione</h1>
        <p class="wip-text">
            Sto lavorando per ottimizzare e ampliare questa sezione del portfolio. 
            Torna a trovarmi presto per vedere gli ultimi aggiornamenti!
        </p>
        <div class="loading-bar" aria-hidden="true">
            <div class="loading-progress"></div>
        </div>
        <a href="../index.html" class="home-button">
            <i class="fas fa-home" aria-hidden="true"></i> Torna alla Home
        </a>
    </div>

    <script src="js/theme.js"></script>
</body>
</html>
